<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Презентация - Порт 8080</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div id="app">
      <div class="w-screen h-screen relative overflow-hidden m-0 p-0">
        <!-- Connection Status -->
        <div
          class="fixed top-5 right-5 flex items-center gap-2.5 bg-black/30 backdrop-blur-md px-4 py-2.5 rounded-full z-50 text-white"
        >
          <div
            class="w-3 h-3 rounded-full transition-colors duration-300"
            :class="isConnected ? 'bg-green-500 shadow-lg shadow-green-500' : 'bg-red-500'"
          ></div>
          <span>{{ isConnected ? 'Подключен (Порт 8080)' : 'Ожидание подключения...' }}</span>
        </div>

        <!-- Demo Sections -->
        <div class="w-full h-full relative overflow-hidden">
          <div
            v-for="(section, index) in sections"
            :key="index"
            class="absolute top-0 left-0 w-full h-full overflow-hidden"
            :class="{
              'opacity-100': activeSection === index,
              'opacity-0': activeSection !== index
            }"
            :ref="(el) => (sectionRefs[index] = el)"
          >
            <component :is="section.component" />
          </div>
        </div>

        <!-- Effects Layer -->
        <div class="absolute top-0 left-0 w-full h-full pointer-events-none z-10">
          <div
            v-for="effect in activeEffects"
            :key="effect.id"
            class="absolute w-48 h-48 rounded-full top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"
            :class="effect.type"
            :style="effect.style"
          ></div>
        </div>
      </div>
    </div>

    <script>
      const { createApp, ref, onMounted, onUnmounted } = Vue;

      // Простые компоненты слайдов
      const IntroSlide = {
        template: `
          <div class="w-full h-full bg-gradient-to-br from-blue-600 to-purple-700 flex items-center justify-center">
            <div class="text-center text-white">
              <h1 class="text-6xl font-bold mb-8">🎯 Презентация</h1>
              <p class="text-2xl opacity-90">Порт 8080</p>
            </div>
          </div>
        `,
      };

      const ProblemsSlide = {
        template: `
          <div class="w-full h-full bg-gradient-to-br from-red-600 to-orange-500 flex items-center justify-center">
            <div class="text-center text-white">
              <h1 class="text-6xl font-bold mb-8">⚠️ Проблемы</h1>
              <p class="text-2xl opacity-90">Что нужно решить</p>
            </div>
          </div>
        `,
      };

      const MVPSlide = {
        template: `
          <div class="w-full h-full bg-gradient-to-br from-green-600 to-teal-500 flex items-center justify-center">
            <div class="text-center text-white">
              <h1 class="text-6xl font-bold mb-8">🚀 MVP</h1>
              <p class="text-2xl opacity-90">Минимально жизнеспособный продукт</p>
            </div>
          </div>
        `,
      };

      const MetricsSlide = {
        template: `
          <div class="w-full h-full bg-gradient-to-br from-yellow-500 to-orange-400 flex items-center justify-center">
            <div class="text-center text-white">
              <h1 class="text-6xl font-bold mb-8">📊 Метрики</h1>
              <p class="text-2xl opacity-90">Как измеряем успех</p>
            </div>
          </div>
        `,
      };

      const NextStepsSlide = {
        template: `
          <div class="w-full h-full bg-gradient-to-br from-indigo-600 to-blue-500 flex items-center justify-center">
            <div class="text-center text-white">
              <h1 class="text-6xl font-bold mb-8">📋 Следующие шаги</h1>
              <p class="text-2xl opacity-90">План действий</p>
            </div>
          </div>
        `,
      };

      const ConclusionSlide = {
        template: `
          <div class="w-full h-full bg-gradient-to-br from-purple-600 to-pink-500 flex items-center justify-center">
            <div class="text-center text-white">
              <h1 class="text-6xl font-bold mb-8">🎉 Заключение</h1>
              <p class="text-2xl opacity-90">Спасибо за внимание!</p>
            </div>
          </div>
        `,
      };

      createApp({
        components: {
          IntroSlide,
          ProblemsSlide,
          MVPSlide,
          MetricsSlide,
          NextStepsSlide,
          ConclusionSlide,
        },
        setup() {
          // WebSocket connection
          const serverUrl = ref("ws://109.197.125.39:8090");
          const isConnected = ref(false);
          const ws = ref(null);

          // Demo state
          const activeSection = ref(0);
          const activeEffects = ref([]);
          const isTransitioning = ref(false);
          const sectionRefs = ref([]);

          // Demo sections
          const sections = ref([
            { title: "Вступление", component: IntroSlide },
            { title: "Проблемы и профиты", component: ProblemsSlide },
            { title: "План действий (MVP за 2 недели)", component: MVPSlide },
            { title: "Как будем измерять прогресс", component: MetricsSlide },
            { title: "Следующие шаги и вовлечение", component: NextStepsSlide },
            { title: "Заключение", component: ConclusionSlide },
          ]);

          // WebSocket connection
          const connect = () => {
            try {
              ws.value = new WebSocket(serverUrl.value);

              ws.value.onopen = () => {
                console.log("Подключен к серверу");
                // Регистрируемся как презентация
                ws.value.send(
                  JSON.stringify({
                    type: "register_client",
                    clientType: "presentation",
                  })
                );
              };

              ws.value.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleCommand(data);
              };

              ws.value.onclose = () => {
                isConnected.value = false;
                console.log("Соединение разорвано");
              };

              ws.value.onerror = (error) => {
                console.error("WebSocket ошибка:", error);
              };
            } catch (error) {
              console.error("Ошибка подключения:", error);
            }
          };

          // Command handling
          const handleCommand = (data) => {
            switch (data.type) {
              case "client_registered":
                isConnected.value = true;
                console.log("Зарегистрирован как презентация");
                break;
              case "next_slide":
                nextSection();
                break;
              case "prev_slide":
                prevSection();
                break;
              case "go_to_slide":
                goToSection(data.slideIndex);
                break;
              case "trigger_effect":
                triggerEffect(data.effectType, data.effectData);
                break;
              case "welcome":
                // Приветственное сообщение
                break;
              default:
                console.log("Получена команда:", data);
            }
          };

          // GSAP animations for slide transitions
          const animateSectionTransition = async (fromIndex, toIndex) => {
            if (isTransitioning.value) return;

            isTransitioning.value = true;

            const tl = gsap.timeline();

            // Fade out current slide
            if (sectionRefs.value[fromIndex]) {
              tl.to(sectionRefs.value[fromIndex], {
                opacity: 0,
                duration: 0.3,
                ease: "power2.out",
              });
            }

            // Change active section
            activeSection.value = toIndex;

            // Fade in new slide
            if (sectionRefs.value[toIndex]) {
              tl.to(
                sectionRefs.value[toIndex],
                {
                  opacity: 1,
                  duration: 0.3,
                  ease: "power2.out",
                },
                "-=0.1"
              );
            }

            // Wait for animation to complete
            await tl.then(() => {
              isTransitioning.value = false;
            });
          };

          // Navigation methods
          const nextSection = async () => {
            if (activeSection.value < sections.value.length - 1 && !isTransitioning.value) {
              await animateSectionTransition(activeSection.value, activeSection.value + 1);
            }
          };

          const prevSection = async () => {
            if (activeSection.value > 0 && !isTransitioning.value) {
              await animateSectionTransition(activeSection.value, activeSection.value - 1);
            }
          };

          const goToSection = async (index) => {
            if (index >= 0 && index < sections.value.length && !isTransitioning.value && index !== activeSection.value) {
              await animateSectionTransition(activeSection.value, index);
            }
          };

          // Effects
          const triggerEffect = (type, data = {}) => {
            const effectId = Date.now() + Math.random();
            const effect = {
              id: effectId,
              type,
              style: getEffectStyle(type, data),
            };

            activeEffects.value.push(effect);

            setTimeout(() => {
              activeEffects.value = activeEffects.value.filter((e) => e.id !== effectId);
            }, 2000);
          };

          const getEffectStyle = (type, data) => {
            switch (type) {
              case "pulse":
                return {
                  background: "radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%)",
                  animation: "pulse 2s ease-out",
                };
              case "sparkle":
                return {
                  background: "radial-gradient(circle, rgba(255,215,0,0.8) 0%, transparent 70%)",
                  animation: "sparkle 2s ease-out",
                };
              default:
                return {};
            }
          };

          // Initialize slides on mount
          onMounted(() => {
            connect();

            // Set initial state for all slides
            gsap.set(sectionRefs.value, { opacity: 0 });
            gsap.set(sectionRefs.value[0], { opacity: 1 });
          });

          onUnmounted(() => {
            if (ws.value) {
              ws.value.close();
            }
          });

          return {
            isConnected,
            activeSection,
            activeEffects,
            sections,
            sectionRefs,
          };
        },
      }).mount("#app");
    </script>

    <style>
      /* Effects animations */
      @keyframes pulse {
        0% {
          transform: translate(-50%, -50%) scale(0);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(3);
          opacity: 0;
        }
      }

      @keyframes sparkle {
        0% {
          transform: translate(-50%, -50%) scale(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(2) rotate(360deg);
          opacity: 0;
        }
      }
    </style>
  </body>
</html>
